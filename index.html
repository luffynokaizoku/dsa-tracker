    <style>
        :root {
          --bg-base: #09090b;
          --bg-surface: #18181b;
          --bg-surface-2: #27272a;
          --bg-hover: #27272a;
          --glass-bg: rgba(18,18,21,0.85);
          --border: #3f3f46;
          --border-light: rgba(255,255,255,0.06);
          --text-main: #f4f4f5;
          --text-muted: #a1a1aa;
          --text-dim: #71717a;
          --accent: #10b981;
          --accent-glow: rgba(16,185,129,0.25);
          --accent-dim: rgba(16,185,129,0.1);
          --danger: #ef4444;
          --lc-color: #f89f1b;
          --gfg-color: #2f8d46;
          --hr-color: #00ea64;
          --easy: #4ade80;
          --med: #fbbf24;
          --hard: #f87171;
          --font: 'Inter', sans-serif;
          --font-head: 'Outfit', sans-serif;
          --font-mono: 'JetBrains Mono', monospace;
          --radius: 12px;
          --t: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
          background: var(--bg-base); color: var(--text-main);
          font-family: var(--font); line-height: 1.6;
          -webkit-font-smoothing: antialiased;
          overflow-x: hidden; padding-bottom: 120px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* ── AMBIENT GLOWS ── */
        .glow-tl {
          position:fixed; top:-20%; left:-10%; width:60vw; height:60vw;
          background: radial-gradient(circle, var(--accent-glow) 0%, transparent 65%);
          border-radius:50%; pointer-events:none; z-index:-1; filter:blur(80px);
        }
        .glow-br {
          position:fixed; bottom:-10%; right:-10%; width:50vw; height:50vw;
          background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 65%);
          border-radius:50%; pointer-events:none; z-index:-1; filter:blur(80px);
        }

        /* ── HEADER ── */
        header {
          position:sticky; top:0; z-index:200; background: var(--glass-bg);
          backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
          border-bottom: 1px solid var(--border); padding: 20px 5%;
        }
        .header-inner {
          max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:20px; flex-wrap:wrap;
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .brand-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 2px solid var(--accent); }
        .brand h1 {
          font-family:var(--font-head); font-size:1.8rem; font-weight:900; letter-spacing:-0.5px;
          background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
          -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .brand h1 em { color:var(--accent); -webkit-text-fill-color:var(--accent); font-style:normal; }

        .header-stats { display:flex; gap:10px; flex-wrap:wrap; margin-left:auto; }
        .hstat {
          display:flex; align-items:center; gap:6px; background: rgba(255,255,255,0.03);
          border:1px solid var(--border); border-radius:20px; padding:6px 14px; font-size:0.8rem; font-weight:600;
        }
        .hstat-dot { width:8px; height:8px; border-radius:50%; }
        .hstat-dot.lc { background:var(--lc-color); }
        .hstat-dot.gfg { background:var(--gfg-color); }
        .hstat-dot.hr { background:var(--hr-color); }

        .header-progress { width:100%; margin-top: 5px;}
        .hp-row { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px; font-size:0.85rem; font-weight:600; color:var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        .hp-pct { color:var(--accent); font-family:var(--font-head); font-size:1.2rem; line-height: 1;}
        .hp-track { width:100%; height:8px; background:var(--bg-hover); border-radius:6px; overflow:hidden; border:1px solid var(--border); }
        .hp-fill { height:100%; background:linear-gradient(90deg,var(--accent),#34d399); width:0%; transition:width 1s cubic-bezier(0.1,0.8,0.3,1); box-shadow:0 0 10px var(--accent); }

        /* ── TAB NAV & FILTERS ── */
        .tab-nav {
          background: var(--glass-bg); backdrop-filter:blur(12px); border-bottom:1px solid var(--border);
          padding:0 5%; display:flex; align-items:center; position:sticky; top:113px; z-index:150;
        }
        .tab-btn {
          background:transparent; border:none; color:var(--text-muted); padding:16px 24px;
          font-family:var(--font); font-size:0.9rem; font-weight:600; cursor:pointer;
          transition:var(--t); border-bottom:2px solid transparent; letter-spacing:0.3px;
        }
        .tab-btn:hover { color:var(--text-main); }
        .tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

        .filter-group { display:flex; gap:8px; margin-left:auto; padding:10px 0; }
        .fbtn {
          background:transparent; border:1px solid var(--border); color:var(--text-muted);
          padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; cursor:pointer; transition:var(--t);
        }
        .fbtn:hover { color:var(--text-main); border-color:#52525b; }
        .fbtn.active { background:var(--text-main); color:var(--bg-base); border-color:var(--text-main); }
        .fbtn-danger { color:var(--danger); border-color:rgba(239,68,68,0.3); margin-left: 10px;}
        .fbtn-danger:hover { background:rgba(239,68,68,0.1); border-color:var(--danger); }

        /* ── MAIN ── */
        main { max-width:1200px; margin:0 auto; padding:40px 5%; min-height: 50vh;}
        .panel { display:none; }
        .panel.active { display:block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        /* ─── 30-DAY PANEL ─── */
        .week-section { margin-bottom:50px; }
        .week-header {
          display:flex; align-items:center; gap:16px; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--border-light);
        }
        .week-chip {
          font-family:var(--font-mono); font-size:0.75rem; font-weight:700; padding:6px 12px; border-radius:6px;
          color:var(--accent); background:var(--accent-dim); text-transform:uppercase; letter-spacing:1px; border: 1px solid var(--accent-glow);
        }
        .week-title { font-family:var(--font-head); font-size:1.5rem; font-weight:800; }
        .week-sub { font-size:0.85rem; color:var(--text-muted); margin-left:auto; font-weight: 500;}

        /* Day Card */
        .day-card {
          background: var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius);
          margin-bottom:12px; overflow:hidden; transition:var(--t);
        }
        .day-card:hover { border-color:#52525b; box-shadow:0 4px 20px rgba(0,0,0,0.4); transform: translateY(-2px);}
        .day-card.complete { border-color:rgba(16,185,129,0.4); }
        .day-card.mock-day { border-color:rgba(251,191,36,0.3); }

        .day-header { display:grid; grid-template-columns:100px 1fr auto; align-items:stretch; cursor:pointer; user-select:none; }
        .day-num-box {
          background:rgba(255,255,255,0.02); border-right:1px solid var(--border);
          display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px 10px; text-align:center;
        }
        .day-num-label { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:1.5px; font-weight: 600;}
        .day-num-val { font-family:var(--font-mono); font-size:1.8rem; font-weight:800; color:var(--text-main); line-height: 1.1;}
        .day-date { font-size:0.65rem; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:0.5px; margin-top:4px; }

        .day-info { padding:20px; display:flex; flex-direction:column; justify-content:center; gap:6px; }
        .day-topic { font-size:1.1rem; font-weight:700; color: #fff;}
        .day-sub-text { font-size:0.85rem; color:var(--text-muted); }
        .day-tags { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }

        .dtag { font-size:0.7rem; font-weight:700; padding:4px 10px; border-radius:6px; text-transform:uppercase; letter-spacing:0.5px; }
        .dtag-easy { background:rgba(74,222,128,0.1); color:var(--easy); border:1px solid rgba(74,222,128,0.2); }
        .dtag-med { background:rgba(251,191,36,0.1); color:var(--med); border:1px solid rgba(251,191,36,0.2); }
        .dtag-hard { background:rgba(248,113,113,0.1); color:var(--hard); border:1px solid rgba(248,113,113,0.2); }
        .dtag-theory { background:rgba(139,92,246,0.1); color:#a78bfa; border:1px solid rgba(139,92,246,0.2); }
        .dtag-mock { background:rgba(251,191,36,0.1); color:var(--med); border:1px solid rgba(251,191,36,0.2); }

        .day-toggle { padding:0 24px; display:flex; align-items:center; color:var(--text-dim); transition:transform 0.3s; }
        .day-card.open .day-toggle { transform:rotate(180deg); color: var(--text-main);}

        .day-body { display:none; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); }
        .day-card.open .day-body { display:block; animation:slideDown 0.3s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

        .day-note { margin:20px; padding:16px 20px; border-radius:8px; font-size:0.9rem; line-height: 1.7;}
        .day-note-theory { background:rgba(139,92,246,0.08); border-left:4px solid #7c3aed; }
        .day-note-theory strong { color:#a78bfa; display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .day-note-mock { background:rgba(251,191,36,0.08); border-left:4px solid var(--med); }
        .day-note-mock strong { color:var(--med); display:block; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }

        /* Problem Rows */
        .prob-group-lbl {
          padding:10px 24px; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted);
          border-top:1px solid var(--border-light); border-bottom:1px solid var(--border-light); background:rgba(255,255,255,0.02);
        }
        .prob-row {
          display:grid; grid-template-columns:40px 50px 1fr auto; align-items:center; gap:16px;
          padding:16px 24px; border-bottom:1px solid var(--border-light); transition:background 0.2s;
        }
        .prob-row:last-child { border-bottom:none; }
        .prob-row:hover { background:rgba(255,255,255,0.04); }
        .prob-row.done .prob-name { text-decoration:line-through; color:var(--text-muted); }

        .src-badge { font-size:0.65rem; font-weight:800; padding:4px 6px; border-radius:4px; text-align:center; letter-spacing:0.5px; }
        .src-lc { background:rgba(248,159,27,0.15); color:var(--lc-color); border: 1px solid rgba(248,159,27,0.3);}
        .src-gfg { background:rgba(47,141,70,0.15); color:var(--gfg-color); border: 1px solid rgba(47,141,70,0.3);}
        .src-hr { background:rgba(0,234,100,0.15); color:var(--hr-color); border: 1px solid rgba(0,234,100,0.3);}

        .prob-name { color:var(--text-main); text-decoration:none; font-size:0.95rem; font-weight:500; transition:color 0.2s; }
        .prob-name:hover { color:var(--accent); }

        .diff-badge { font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:12px; }

        /* Custom Checkbox */
        .custom-cb {
          appearance:none; width:22px; height:22px; border:2px solid var(--text-dim); border-radius:6px;
          cursor:pointer; background:rgba(0,0,0,0.2); outline:none; transition:var(--t); position:relative; display:grid; place-items:center;
        }
        .custom-cb:checked { background:var(--accent); border-color:var(--accent); box-shadow: 0 0 10px rgba(16,185,129,0.4);}
        .custom-cb:checked::before {
          content:""; width:5px; height:10px; border:solid #000; border-width:0 2.5px 2.5px 0;
          transform:rotate(45deg); margin-bottom:2px;
        }
        .custom-cb:hover:not(:checked) { border-color:var(--accent); background: rgba(16,185,129,0.1);}

        /* ─── TOPIC PANEL ─── */
        .cat-grid { display:grid; gap:20px; }
        .cat-card { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:var(--t); }
        .cat-card:hover { border-color:#52525b; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
        .cat-header { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; user-select:none; gap:16px; }
        .cat-info h2 { font-family:var(--font-head); font-size:1.3rem; font-weight:700; margin-bottom:8px; color: #fff;}
        .cat-meta { display:flex; align-items:center; gap:16px; font-size:0.85rem; color:var(--text-muted); font-weight:600; }
        .cat-bar-track { width:120px; height:6px; background:var(--bg-hover); border-radius:6px; overflow:hidden; }
        .cat-bar-fill { height:100%; background:var(--accent); border-radius:6px; transition:width 0.5s ease; box-shadow: 0 0 8px var(--accent);}
        .cat-card.open .cat-toggle { transform:rotate(180deg); color: #fff;}
        .cat-toggle { transition:transform 0.3s; color:var(--text-dim); flex-shrink:0; }
        .cat-prob-list { display:none; border-top:1px solid var(--border); background:rgba(0,0,0,0.2); }
        .cat-card.open .cat-prob-list { display:block; animation:slideDown 0.3s ease-out; }

        /* ── FOOTER (CREDITS) ── */
        footer {
            margin-top: 60px; padding: 30px 5%; border-top: 1px solid var(--border);
            text-align: center; background: var(--bg-surface); color: var(--text-muted);
            font-size: 0.9rem;
        }
        footer p { margin-bottom: 8px; }
        footer a { color: var(--accent); text-decoration: none; font-weight: 600; transition: var(--t); }
        footer a:hover { color: #34d399; text-decoration: underline; text-underline-offset: 4px;}
        .dev-credit { font-family: var(--font-head); font-size: 1.1rem; color: #fff; margin-top: 10px;}

        /* ── TOAST & BANNER ── */
        #toast {
          visibility:hidden; min-width:240px; background:var(--bg-surface-2); border:1px solid var(--accent);
          color:var(--accent); text-align:center; border-radius:8px; padding:16px 24px;
          position:fixed; z-index:9999; left:50%; bottom:40px; transform:translateX(-50%);
          font-weight:700; font-size:0.9rem; box-shadow:0 10px 30px rgba(0,0,0,0.6);
          display:flex; align-items:center; justify-content:center; gap:10px;
        }
        #toast.show { visibility:visible; animation:fadeIn 0.4s, fadeOut 0.4s 2.5s; }

        /* Install Banner */
        .install-banner {
          position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
          width: 90%; max-width: 450px; background: var(--bg-surface-2);
          border: 1px solid var(--border); border-radius: 16px;
          padding: 16px 20px; display: flex; align-items: center; gap: 16px;
          box-shadow: 0 15px 50px rgba(0,0,0,0.8); z-index: 1000;
          transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .install-banner.show { bottom: 30px; }
        .install-img { width: 44px; height: 44px; border-radius: 10px; object-fit: cover; border: 1px solid var(--border);}
        .install-text { flex: 1; font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;}
        .install-text strong { color: #fff; font-size: 1rem; display: block; margin-bottom: 2px; font-family: var(--font-head);}
        .install-btn {
            background: var(--accent); color: #000; border: none;
            padding: 10px 18px; border-radius: 8px; font-weight: 700;
            cursor: pointer; font-family: var(--font); font-size: 0.9rem;
        }
        .close-install { background: transparent; border: none; color: var(--text-dim); cursor: pointer; padding: 4px; }

        @media(max-width:768px) {
          .header-inner { flex-direction:column; align-items:stretch; }
          .header-stats { margin-left:0; }
          .day-header { grid-template-columns:80px 1fr 30px; }
          .prob-row { grid-template-columns:30px 40px 1fr; padding: 16px; }
          .diff-badge { display:none; }
          .tab-nav { flex-wrap:wrap; top:auto; position:relative; }
          .filter-group { flex-wrap:wrap; }
          .week-header { flex-direction: column; align-items: flex-start; gap: 8px;}
          .week-sub { margin-left: 0; }
        }
    </style>
</head>

<div class="glow-br"></div>

<header>
    <div class="header-inner">
        <div class="brand">
            <img src="https://w0.peakpx.com/wallpaper/431/713/HD-wallpaper-naruto-logo-anime-8k-naruto-anime-logo.jpg" alt="Logo" class="brand-img">
            <h1>FAANG <em>DSA</em> Tracker</h1>
        </div>
        <div class="header-stats">
            <div class="hstat"><span class="hstat-dot lc"></span><span id="h-lc">0</span> LC</div>
            <div class="hstat"><span class="hstat-dot gfg"></span><span id="h-gfg">0</span> GFG</div>
            <div class="hstat"><span class="hstat-dot hr"></span><span id="h-hr">0</span> HR</div>
        </div>
        <div class="header-progress">
            <div class="hp-row">
                <span id="h-count">0 / 0 Solved</span>
                <span class="hp-pct" id="h-pct">0%</span>
            </div>
            <div class="hp-track"><div class="hp-fill" id="h-fill"></div></div>
        </div>
    </div>
</header>

<div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('plan',this)">📅 30-Day Plan</button>
    <button class="tab-btn" onclick="switchTab('topic',this)">🗂️ By Topic</button>
    <div class="filter-group" id="filter-group">
        <button class="fbtn active" onclick="setFilter('all',this)">All</button>
        <button class="fbtn" onclick="setFilter('pending',this)">Pending</button>
        <button class="fbtn" onclick="setFilter('done',this)">Completed</button>
        <button class="fbtn fbtn-danger" onclick="resetAll()">Reset</button>
    </div>
</div>

<main>
    <div class="panel active" id="panel-plan">
        <div id="plan-container"></div>
    </div>
    <div class="panel" id="panel-topic">
        <div class="cat-grid" id="topic-container"></div>
    </div>
</main>

<footer>
    <p>Premium FAANG DSA Curriculum. Progress saved locally in your browser.</p>
    <div class="dev-credit">
        Developed by <a href="https://github.com/suresurya" target="_blank">スレ・スルヤ (suresurya)</a>
    </div>
</footer>

<div class="install-banner" id="install-banner">
    <img src="https://w0.peakpx.com/wallpaper/431/713/HD-wallpaper-naruto-logo-anime-8k-naruto-anime-logo.jpg" alt="Icon" class="install-img">
    <div class="install-text" id="install-text">
        <strong>Install DSA Tracker</strong>
        Add to home screen for quick access.
    </div>
    <button class="install-btn" id="install-btn">Install</button>
    <button class="close-install" id="close-install">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
</div>

<div id="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    Problem Completed!
</div>

<script>
    // ─── STORAGE ───
    const SK = 'faang_dsa_v5'; // Unique key to guarantee 0% start
    let P = JSON.parse(localStorage.getItem(SK)) || {};

    function save() { localStorage.setItem(SK, JSON.stringify(P)); }
    function pkey(day, gi, pi) { return `d${day}_g${gi}_p${pi}`; }

    function setupNotifications() {

        if (Notification.permission === "granted") {
            if (lastNotif !== today) triggerNotification(today);
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission().then(permission => {
                if (permission === "granted" && lastNotif !== today) triggerNotification(today);
            });
        }
    }

    let currentTab = 'plan';

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+tab).classList.add('active');
      applyFilter(currentFilter);
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.fbtn:not(.fbtn-danger)').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      applyFilter(f);
    }

    function applyFilter(f) {
      if (currentTab === 'plan') {
        document.querySelectorAll('.day-card').forEach(card => {
          if (card.dataset.mock === 'true') { card.style.display='block'; return; }
          if (f === 'all') { card.style.display='block'; return; }
          const all = card.querySelectorAll('.custom-cb');
          const checked = card.querySelectorAll('.custom-cb:checked');
          if (f === 'done') card.style.display = (all.length && all.length === checked.length) ? 'block' : 'none';
          else card.style.display = (checked.length < all.length || !all.length) ? 'block' : 'none';
        });
      } else {
        document.querySelectorAll('.cat-card').forEach(card => {
          if (f === 'all') { card.style.display='block'; return; }
          const all = card.querySelectorAll('.custom-cb');
          const checked = card.querySelectorAll('.custom-cb:checked');
          if (f === 'done') card.style.display = (all.length && all.length === checked.length) ? 'block' : 'none';
          else card.style.display = (checked.length < all.length) ? 'block' : 'none';
        });
      }
    }

    function renderPlan() {
      const container = document.getElementById('plan-container');
      let html = '';
      PLAN.forEach(week => {
        html += `<div class="week-section">
          <div class="week-header">
            <span class="week-chip">Week ${week.week}</span>
            <h2 class="week-title">${week.title}</h2>
            <span class="week-sub">${week.sub}</span>
          </div>`;
        week.days.forEach(day => {
          const isMock = !!day.mock;
          let totCount = 0, doneCount = 0, easy=0, med=0, hard=0;
          if (!isMock && day.groups) {
            day.groups.forEach((g, gi) => g.probs.forEach((p, pi) => {
              totCount++;
              if (isDone(pkey(day.day,gi,pi))) doneCount++;
              if (p.d==='Easy') easy++;
              if (p.d==='Medium') med++;
              if (p.d==='Hard') hard++;
            }));
          }
          const isComplete = totCount > 0 && totCount === doneCount;
          html += `<div class="day-card ${isMock ? 'mock-day' : ''} ${isComplete ? 'complete' : ''}" id="dcard-${day.day}" data-mock="${isMock}">
            <div class="day-header" onclick="toggleDay(${day.day})">
              <div class="day-num-box">
                <span class="day-num-label">Day</span>
                <span class="day-num-val">${String(day.day).padStart(2,'0')}</span>
                <span class="day-date">${dayDateStr(day.day)}</span>
              </div>
              <div class="day-info">
                <div class="day-topic">${day.topic}</div>
                <div class="day-sub-text">${day.sub}</div>
                <div class="day-tags">`;
          if (isMock) { html += `<span class="dtag dtag-mock">Mock Interview</span>`; }
          else {
            if (day.theory) html += `<span class="dtag dtag-theory">Theory</span>`;
            if (easy) html += `<span class="dtag dtag-easy">${easy} Easy</span>`;
            if (med) html += `<span class="dtag dtag-med">${med} Medium</span>`;
            if (hard) html += `<span class="dtag dtag-hard">${hard} Hard</span>`;
            if (totCount) html += `<span class="dtag" style="background:rgba(255,255,255,0.04);color:var(--text-muted);border:1px solid var(--border)">${doneCount}/${totCount}</span>`;
          }
          html += `</div></div>
              <div class="day-toggle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
            </div>
            <div class="day-body">`;
          if (isMock) {
            html += `<div class="day-note day-note-mock"><strong>📋 Instructions</strong>${day.mockInstructions.map(i=>`• ${i}<br>`).join('')}</div>`;
          } else {
            if (day.theory) html += `<div class="day-note day-note-theory"><strong>📚 Curriculum Reading</strong>${day.theory}</div>`;
            day.groups.forEach((g, gi) => {
              html += `<div class="prob-group-lbl">${g.lbl}</div>`;
              g.probs.forEach((p, pi) => {
                const k = pkey(day.day, gi, pi);
                const done = isDone(k);
                html += `<div class="prob-row ${done?'done':''}" id="pr-${k}">
                  <input type="checkbox" class="custom-cb" ${done?'checked':''} onchange="togglePlanProb(this,'${k}',${day.day})">
                  <span class="src-badge src-${p.src.toLowerCase()}">${p.src}</span>
                  <a href="${p.url}" target="_blank" class="prob-name">${p.n}</a>
                  <span class="diff-badge diff-${p.d}">${p.d}</span>
                </div>`;
              });
            });
          }
          html += `</div></div>`;
        });
        html += `</div>`;
      });
      container.innerHTML = html;
    }

      let html = '';

        cat.probs.forEach((_, pi) => { if(isDone(topicKey(ci,pi))) done++; });
        const pct = Math.round((done/tot)*100)||0;
        html += `<div class="cat-card" id="cat-${ci}">
          <div class="cat-header" onclick="toggleCat(${ci})">
            <div class="cat-info">
              <h2>${cat.name}</h2>

                <span id="ccount-${ci}">${done} / ${tot}</span>

        cat.probs.forEach((p, pi) => {
          const k = topicKey(ci, pi);
          const done = isDone(k);
          html += `<div class="prob-row ${done?'done':''}" id="cpr-${k}">
            <input type="checkbox" class="custom-cb" ${done?'checked':''} onchange="toggleTopicProb(this,'${k}',${ci})">

    function toggleDay(dayNum) { document.getElementById('dcard-'+dayNum).classList.toggle('open'); }
    function toggleCat(ci) {
      const card = document.getElementById('cat-'+ci); card.classList.toggle('open');
    }

    function togglePlanProb(cb, key, dayNum) {
      setDone(key, cb.checked);
      const row = document.getElementById('pr-'+key);
      cb.checked ? row.classList.add('done') : row.classList.remove('done');
      const card = document.getElementById('dcard-'+dayNum);
      const all = card.querySelectorAll('.custom-cb');
      const chk = card.querySelectorAll('.custom-cb:checked');
      if (all.length && all.length === chk.length) card.classList.add('complete');
      else card.classList.remove('complete');
      updateGlobalStats();
      if (cb.checked) showToast();
    }

    function toggleTopicProb(cb, key, ci) {
      setDone(key, cb.checked);
      const row = document.getElementById('cpr-'+key);
      cb.checked ? row.classList.add('done') : row.classList.remove('done');
      const tot = TOPICS[ci].probs.length;
      let done = 0;
      TOPICS[ci].probs.forEach((_,pi) => { if(isDone(topicKey(ci,pi))) done++; });
      const pct = Math.round((done/tot)*100)||0;
      document.getElementById('ccount-'+ci).innerText = `${done} / ${tot}`;
      document.getElementById('cbar-'+ci).style.width = pct+'%';
      updateGlobalStats();
      if (cb.checked) showToast();
    }

    function updateGlobalStats() {
      let total=0, done=0, lc=0, gfg=0, hr=0;
      PLAN.forEach(w => w.days.forEach(day => {
        if (!day.groups) return;
        day.groups.forEach((g, gi) => g.probs.forEach((p, pi) => {
          total++;
          if (isDone(pkey(day.day,gi,pi))) {
            done++;
            if (p.src==='LC') lc++;
            if (p.src==='GFG') gfg++;
            if (p.src==='HR') hr++;
          }
        }));
      }));
      const pct = total ? Math.round((done/total)*100) : 0;
      document.getElementById('h-count').innerText = `${done} / ${total} Solved`;
      document.getElementById('h-pct').innerText = pct+'%';
      document.getElementById('h-fill').style.width = pct+'%';
      document.getElementById('h-lc').innerText = lc;
      document.getElementById('h-gfg').innerText = gfg;
      document.getElementById('h-hr').innerText = hr;
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.className = 'show';
      setTimeout(() => { t.className = t.className.replace('show',''); }, 2800);
    }

    function resetAll() {
      if (confirm('⚠️ Reset ALL progress? This cannot be undone.')) {
        Object.keys(localStorage).forEach(k => {
          if (k === SK || k === 'faang_start_v5' || k === 'last_notif_date_v5') localStorage.removeItem(k);
        });
        P = {}; localStorage.removeItem(SK); location.reload();
      }
    }

    // ─── INIT ───
    renderPlan();
    renderTopics();
    updateGlobalStats();
    setupNotifications();

    // ─── PWA & INSTALL BANNER LOGIC ───
    const installBanner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const installText = document.getElementById('install-text');
    const closeBtn = document.getElementById('close-install');
    let deferredPrompt;

    const isIos = () => {
      const userAgent = window.navigator.userAgent.toLowerCase();
      return /iphone|ipad|ipod/.test(userAgent);
    };
    const isStandalone = () => ('standalone' in window.navigator && window.navigator.standalone) || window.matchMedia('(display-mode: standalone)').matches;

    if (!isStandalone()) {
        setTimeout(() => {
            if (isIos()) {
                installText.innerHTML = `<strong>Install App</strong>Tap <span style="font-size:1.4rem;line-height:0">⍐</span> below, then <b>Add to Home Screen</b>.`;
                installBtn.style.display = 'none';
                installBanner.classList.add('show');
            } else {
                installText.innerHTML = `<strong>Install App</strong>Tap the menu (⋮) and select <b>Add to Home screen</b>.`;
                installBtn.style.display = 'none';
                installBanner.classList.add('show');
            }
        }, 3000);
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installText.innerHTML = `<strong>Install DSA Tracker</strong>Add to home screen for quick access.`;
        installBtn.style.display = 'block';
        installBanner.classList.add('show');
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') installBanner.classList.remove('show');
            deferredPrompt = null;
        }
    });

    closeBtn.addEventListener('click', () => {
        installBanner.classList.remove('show');
    });
</script>
</body>
</html>
